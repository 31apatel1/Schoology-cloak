<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schoology</title>

  <!-- Browser tab icon -->
  <link rel="icon"
    href="https://asset-cdn.schoology.com/sites/all/themes/schoology_theme/favicon.ico">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:14px;
      box-shadow:0 4px 12px rgba(0,0,0,.12);
      text-align:center;
    }

    .logo{
      width:140px;
      margin-bottom:20px;
    }

    a{
      display:inline-block;
      margin-top:15px;
      padding:12px 18px;
      background:#1d5fa7;
      color:white;
      text-decoration:none;
      border-radius:8px;
    }
  </style>
</head>
<body>

<div class="card">
  <img class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Schoology_logo.svg"
    alt="Schoology">

  <h2>Schoology</h2>

  <!-- Replace file.pdf with your file -->
  <a href="file.pdf" download>
    Download File
  </a>
</div>

</body>
</html>
