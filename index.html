<!DOCTYPE html>
<html>
<head>

<base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/cookieclicker/">

<title>Cookie Clicker - Neon UI</title>
<meta name="viewport" content="width=900, initial-scale=1">

<link rel="shortcut icon" href="img/favicon.ico" />

<link href="style.css?v=10c" rel="stylesheet" type="text/css">
<script src="main2.js?v=13g"></script>

<!-- ⭐ MODERN UI OVERHAUL -->
<style>
body {
    background: radial-gradient(circle at top, #12001f, #05010a) !important;
    color: #e8e0ff !important;
}

/* Glass UI panels */
#topBar, #game, #sectionLeft, #sectionMiddle, #sectionRight {
    background: rgba(20, 20, 35, 0.72) !important;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(170, 100, 255, 0.25) !important;
    box-shadow: 0 0 25px rgba(140, 80, 255, 0.2) !important;
}

/* Top bar neon */
#topBar {
    background: linear-gradient(90deg, rgba(120,0,255,0.4), rgba(0,200,255,0.15)) !important;
}

/* Big cookie glow */
#bigCookie {
    transition: transform 0.1s ease, filter 0.2s ease !important;
    filter: drop-shadow(0 0 15px rgba(255, 200, 120, 0.5));
}

#bigCookie:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 30px rgba(255, 220, 150, 0.9));
}

#bigCookie:active {
    transform: scale(0.98);
}

/* Buttons */
.panelButton, .storeSection div {
    transition: 0.2s ease !important;
}

.panelButton:hover, .storeSection div:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 12px rgba(180, 120, 255, 0.5);
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(#7a4cff, #2ee6ff);
    border-radius: 10px;
}

/* Cookie number glow */
#cookies {
    text-shadow: 0 0 10px rgba(180, 120, 255, 0.6);
    animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
    0% { text-shadow: 0 0 5px rgba(180,120,255,0.3); }
    50% { text-shadow: 0 0 20px rgba(180,120,255,0.7); }
    100% { text-shadow: 0 0 5px rgba(180,120,255,0.3); }
}
</style>

</head>

<body>

<div id="wrapper">

    <div id="game">

        <!-- GAME LOADS HERE (UNCHANGED COOKIE CLICKER ENGINE) -->

        <canvas id="backgroundCanvas"></canvas>

        <div id="bigCookie"></div>

    </div>

</div>

<!-- ⭐ CLICK PARTICLES EFFECT -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const cookie = document.getElementById("bigCookie");

    cookie.addEventListener("click", function (e) {
        for (let i = 0; i < 8; i++) {
            const p = document.createElement("div");

            p.style.position = "absolute";
            p.style.width = "6px";
            p.style.height = "6px";
            p.style.borderRadius = "50%";
            p.style.background = "#b57bff";
            p.style.left = e.pageX + "px";
            p.style.top = e.pageY + "px";
            p.style.pointerEvents = "none";
            p.style.zIndex = 9999;

            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = 30 + Math.random() * 70;

            const dx = Math.cos(angle) * velocity;
            const dy = Math.sin(angle) * velocity;

            requestAnimationFrame(() => {
                p.style.transition = "0.6s ease-out";
                p.style.transform = `translate(${dx}px, ${dy}px)`;
                p.style.opacity = "0";
            });

            setTimeout(() => p.remove(), 600);
        }
    });
});
</script>

</body>
</html>
